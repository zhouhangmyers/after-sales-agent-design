# Alembic 的主配置文件。
# Alembic 是 SQLAlchemy 常用的数据库迁移工具，用来管理表结构版本变更。
[alembic]
# 迁移脚本目录，alembic upgrade / revision 等命令会到这里找迁移文件。
script_location = migrations
# 执行 Alembic 时，先把当前项目根目录加进 Python 模块搜索路径。
# 这样 migrations/env.py 里就能直接 import 项目代码。
prepend_sys_path = .
# 默认数据库连接地址。
# 当前指向项目根目录下的 SQLite 文件；如果运行时显式传 DATABASE_URL，
# env.py 里通常会再用环境变量覆盖它。
sqlalchemy.url = sqlite+pysqlite:///./agent_platform.db

# 下面这些是 Alembic / SQLAlchemy 自己的日志配置。
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
# 根日志器，默认只打印 WARN 及以上级别。
level = WARN
handlers = console

[logger_sqlalchemy]
# SQLAlchemy 引擎日志级别，默认也是 WARN，避免输出过多 SQL 细节。
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
# Alembic 自己的日志级别，设为 INFO，这样执行迁移时能看到版本升级信息。
level = INFO
handlers = console
qualname = alembic

[handler_console]
# 把日志输出到控制台标准错误流。
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
# 控制日志打印格式。
format = %(levelname)-5.5s [%(name)s] %(message)s
