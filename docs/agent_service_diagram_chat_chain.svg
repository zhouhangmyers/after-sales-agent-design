<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1220" role="img" aria-label="architecture diagram">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#5e6678"></path>
    </marker>
  </defs>
  <text x="32" y="34" font-size="22" fill="#214b80" font-weight="700" text-anchor="start">POST /chat 主链路</text><circle cx="44" cy="118" r="18" fill="#214b80"></circle><text x="44" y="124" font-size="12" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><rect x="80" y="72" width="760" height="92" rx="18" ry="18" fill="#f6f9ff" stroke="#214b80" stroke-width="2"/><text x="96" y="100" font-size="15" fill="#214b80" font-weight="700" text-anchor="start">POST /api/v1/chat</text><text x="96" y="124" font-size="12" fill="#162033" font-weight="400" text-anchor="start">FastAPI 解析请求体为 ChatRequest</text><line x1="44" y1="136" x2="44" y2="192" stroke="#5e6678" stroke-width="2.4" marker-end="url(#arrow)"/><circle cx="44" cy="230" r="18" fill="#214b80"></circle><text x="44" y="236" font-size="12" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><rect x="80" y="184" width="760" height="92" rx="18" ry="18" fill="#f6f9ff" stroke="#214b80" stroke-width="2"/><text x="96" y="212" font-size="15" fill="#214b80" font-weight="700" text-anchor="start">Depends 注入</text><text x="96" y="236" font-size="12" fill="#162033" font-weight="400" text-anchor="start">拿到 db_session 与 runtime_service</text><line x1="44" y1="248" x2="44" y2="304" stroke="#5e6678" stroke-width="2.4" marker-end="url(#arrow)"/><circle cx="44" cy="342" r="18" fill="#214b80"></circle><text x="44" y="348" font-size="12" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><rect x="80" y="296" width="760" height="92" rx="18" ry="18" fill="#f6f9ff" stroke="#214b80" stroke-width="2"/><text x="96" y="324" font-size="15" fill="#214b80" font-weight="700" text-anchor="start">ChatService.handle_chat</text><text x="96" y="348" font-size="12" fill="#162033" font-weight="400" text-anchor="start">统一生成 id、掌控事务边界</text><line x1="44" y1="360" x2="44" y2="416" stroke="#5e6678" stroke-width="2.4" marker-end="url(#arrow)"/><circle cx="44" cy="454" r="18" fill="#214b80"></circle><text x="44" y="460" font-size="12" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><rect x="80" y="408" width="760" height="92" rx="18" ry="18" fill="#f6f9ff" stroke="#214b80" stroke-width="2"/><text x="96" y="436" font-size="15" fill="#214b80" font-weight="700" text-anchor="start">repositories -&gt; DB</text><text x="96" y="460" font-size="12" fill="#162033" font-weight="400" text-anchor="start">写 session / user message / workflow_run(running)</text><line x1="44" y1="472" x2="44" y2="528" stroke="#5e6678" stroke-width="2.4" marker-end="url(#arrow)"/><circle cx="44" cy="566" r="18" fill="#d46d2b"></circle><text x="44" y="572" font-size="12" fill="#ffffff" font-weight="700" text-anchor="middle">5</text><rect x="80" y="520" width="760" height="92" rx="18" ry="18" fill="#fff5eb" stroke="#d46d2b" stroke-width="2"/><text x="96" y="548" font-size="15" fill="#d46d2b" font-weight="700" text-anchor="start">RuntimeService</text><text x="96" y="572" font-size="12" fill="#162033" font-weight="400" text-anchor="start">parse_message() 识别 add / get_city</text><line x1="44" y1="584" x2="44" y2="640" stroke="#5e6678" stroke-width="2.4" marker-end="url(#arrow)"/><circle cx="44" cy="678" r="18" fill="#d46d2b"></circle><text x="44" y="684" font-size="12" fill="#ffffff" font-weight="700" text-anchor="middle">6</text><rect x="80" y="632" width="760" height="92" rx="18" ry="18" fill="#fff5eb" stroke="#d46d2b" stroke-width="2"/><text x="96" y="660" font-size="15" fill="#d46d2b" font-weight="700" text-anchor="start">AgentRuntime.execute</text><text x="96" y="684" font-size="12" fill="#162033" font-weight="400" text-anchor="start">查工具、参数校验、handler 执行、错误归一</text><line x1="44" y1="696" x2="44" y2="752" stroke="#5e6678" stroke-width="2.4" marker-end="url(#arrow)"/><circle cx="44" cy="790" r="18" fill="#214b80"></circle><text x="44" y="796" font-size="12" fill="#ffffff" font-weight="700" text-anchor="middle">7</text><rect x="80" y="744" width="760" height="92" rx="18" ry="18" fill="#f6f9ff" stroke="#214b80" stroke-width="2"/><text x="96" y="772" font-size="15" fill="#214b80" font-weight="700" text-anchor="start">ChatService</text><text x="96" y="796" font-size="12" fill="#162033" font-weight="400" text-anchor="start">生成 reply，并按需写入 tool_calls</text><line x1="44" y1="808" x2="44" y2="864" stroke="#5e6678" stroke-width="2.4" marker-end="url(#arrow)"/><circle cx="44" cy="902" r="18" fill="#214b80"></circle><text x="44" y="908" font-size="12" fill="#ffffff" font-weight="700" text-anchor="middle">8</text><rect x="80" y="856" width="760" height="92" rx="18" ry="18" fill="#f6f9ff" stroke="#214b80" stroke-width="2"/><text x="96" y="884" font-size="15" fill="#214b80" font-weight="700" text-anchor="start">repositories -&gt; DB</text><text x="96" y="908" font-size="12" fill="#162033" font-weight="400" text-anchor="start">写 assistant message 与 workflow_run(completed)</text><line x1="44" y1="920" x2="44" y2="976" stroke="#5e6678" stroke-width="2.4" marker-end="url(#arrow)"/><circle cx="44" cy="1014" r="18" fill="#214b80"></circle><text x="44" y="1020" font-size="12" fill="#ffffff" font-weight="700" text-anchor="middle">9</text><rect x="80" y="968" width="760" height="92" rx="18" ry="18" fill="#f6f9ff" stroke="#214b80" stroke-width="2"/><text x="96" y="996" font-size="15" fill="#214b80" font-weight="700" text-anchor="start">commit + ChatResponse</text><text x="96" y="1020" font-size="12" fill="#162033" font-weight="400" text-anchor="start">提交事务后返回 reply + tool_result</text><rect x="80" y="1090" width="760" height="88" rx="18" ry="18" fill="#eefcfb" stroke="#0d7d89" stroke-width="2"/><text x="96" y="1118" font-size="15" fill="#0d7d89" font-weight="700" text-anchor="start">链路结论</text><text x="96" y="1142" font-size="12" fill="#162033" font-weight="400" text-anchor="start">这条链路的核心不是路由，而是 ChatService 对“先记上下文，再执行，再回写结果”的统一编排。</text>
</svg>