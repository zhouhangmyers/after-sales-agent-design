<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 820" role="img" aria-label="architecture diagram">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#5e6678"></path>
    </marker>
  </defs>
  <rect x="315" y="36" width="330" height="78" rx="18" ry="18" fill="#eefcfb" stroke="#0d7d89" stroke-width="2"/><text x="331" y="64" font-size="15" fill="#0d7d89" font-weight="700" text-anchor="start">外部客户端</text><text x="331" y="88" font-size="12" fill="#162033" font-weight="400" text-anchor="start">Browser / CLI / tests</text><rect x="285" y="160" width="390" height="88" rx="18" ry="18" fill="#eef4ff" stroke="#214b80" stroke-width="2"/><text x="301" y="188" font-size="15" fill="#214b80" font-weight="700" text-anchor="start">FastAPI App</text><text x="301" y="212" font-size="12" fill="#162033" font-weight="400" text-anchor="start">create_app()</text><text x="301" y="230" font-size="12" fill="#162033" font-weight="400" text-anchor="start">app.state 挂载共享资源</text><line x1="480" y1="114" x2="480" y2="160" stroke="#2b5b90" stroke-width="2.4" marker-end="url(#arrow)"/><rect x="42" y="320" width="220" height="118" rx="18" ry="18" fill="#f6f9ff" stroke="#214b80" stroke-width="2"/><text x="58" y="348" font-size="15" fill="#214b80" font-weight="700" text-anchor="start">API 层</text><text x="58" y="372" font-size="12" fill="#162033" font-weight="400" text-anchor="start">api.chat</text><text x="58" y="390" font-size="12" fill="#162033" font-weight="400" text-anchor="start">api.deps</text><text x="58" y="408" font-size="12" fill="#162033" font-weight="400" text-anchor="start">api.health</text><rect x="325" y="320" width="220" height="118" rx="18" ry="18" fill="#effbf8" stroke="#0d7d89" stroke-width="2"/><text x="341" y="348" font-size="15" fill="#0d7d89" font-weight="700" text-anchor="start">服务编排层</text><text x="341" y="372" font-size="12" fill="#162033" font-weight="400" text-anchor="start">ChatService</text><text x="341" y="390" font-size="12" fill="#162033" font-weight="400" text-anchor="start">StreamService</text><rect x="608" y="320" width="220" height="118" rx="18" ry="18" fill="#fff5eb" stroke="#d46d2b" stroke-width="2"/><text x="624" y="348" font-size="15" fill="#d46d2b" font-weight="700" text-anchor="start">运行时适配层</text><text x="624" y="372" font-size="12" fill="#162033" font-weight="400" text-anchor="start">RuntimeService</text><text x="624" y="390" font-size="12" fill="#162033" font-weight="400" text-anchor="start">parse -&gt; execute</text><line x1="480" y1="248" x2="150" y2="320" stroke="#2b5b90" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="480" y1="248" x2="435" y2="320" stroke="#2b5b90" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="480" y1="248" x2="718" y2="320" stroke="#2b5b90" stroke-width="2.4" marker-end="url(#arrow)"/><rect x="42" y="510" width="220" height="118" rx="18" ry="18" fill="#f6f9ff" stroke="#214b80" stroke-width="2"/><text x="58" y="538" font-size="15" fill="#214b80" font-weight="700" text-anchor="start">持久化层</text><text x="58" y="562" font-size="12" fill="#162033" font-weight="400" text-anchor="start">repositories</text><text x="58" y="580" font-size="12" fill="#162033" font-weight="400" text-anchor="start">thin write/read wrappers</text><rect x="325" y="510" width="220" height="118" rx="18" ry="18" fill="#eefaf0" stroke="#2a8a58" stroke-width="2"/><text x="341" y="538" font-size="15" fill="#2a8a58" font-weight="700" text-anchor="start">事件缓存</text><text x="341" y="562" font-size="12" fill="#162033" font-weight="400" text-anchor="start">InMemoryEventCache</text><text x="341" y="580" font-size="12" fill="#162033" font-weight="400" text-anchor="start">RedisEventCache</text><rect x="608" y="510" width="220" height="118" rx="18" ry="18" fill="#fff5eb" stroke="#d46d2b" stroke-width="2"/><text x="624" y="538" font-size="15" fill="#d46d2b" font-weight="700" text-anchor="start">执行内核</text><text x="624" y="562" font-size="12" fill="#162033" font-weight="400" text-anchor="start">AgentRuntime</text><text x="624" y="580" font-size="12" fill="#162033" font-weight="400" text-anchor="start">registry + validation</text><line x1="435" y1="438" x2="150" y2="510" stroke="#2b5b90" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="435" y1="438" x2="435" y2="510" stroke="#2b5b90" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="718" y1="438" x2="718" y2="510" stroke="#d46d2b" stroke-width="2.4" marker-end="url(#arrow)"/><rect x="42" y="682" width="220" height="102" rx="18" ry="18" fill="#f6f9ff" stroke="#214b80" stroke-width="2"/><text x="58" y="710" font-size="15" fill="#214b80" font-weight="700" text-anchor="start">数据库</text><text x="58" y="734" font-size="12" fill="#162033" font-weight="400" text-anchor="start">sessions / messages</text><text x="58" y="752" font-size="12" fill="#162033" font-weight="400" text-anchor="start">tool_calls / workflow_runs</text><line x1="150" y1="628" x2="150" y2="682" stroke="#2b5b90" stroke-width="2.4" marker-end="url(#arrow)"/><text x="320" y="688" font-size="20" fill="#0d7d89" font-weight="700" text-anchor="start">关系重点</text><text x="320" y="722" font-size="13" fill="#162033" font-weight="400" text-anchor="start">1. API 只做协议接入，不直接承载事务。</text><text x="320" y="744" font-size="13" fill="#162033" font-weight="400" text-anchor="start">2. ChatService 是真正的业务编排中心。</text><text x="320" y="766" font-size="13" fill="#162033" font-weight="400" text-anchor="start">3. RuntimeService 只负责把消息桥接到 agent_runtime。</text><text x="320" y="788" font-size="13" fill="#162033" font-weight="400" text-anchor="start">4. repository 与 db model 负责稳定持久化边界。</text>
</svg>