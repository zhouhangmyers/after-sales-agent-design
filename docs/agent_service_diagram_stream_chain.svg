<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" role="img" aria-label="architecture diagram">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#5e6678"></path>
    </marker>
  </defs>
  <text x="30" y="36" font-size="22" fill="#0d7d89" font-weight="700" text-anchor="start">GET /chat/stream 输出链</text><rect x="24" y="86" width="130" height="112" rx="18" ry="18" fill="#f6f9ff" stroke="#214b80" stroke-width="2"/><text x="40" y="114" font-size="15" fill="#214b80" font-weight="700" text-anchor="start">GET /chat/stream</text><text x="40" y="138" font-size="12" fill="#162033" font-weight="400" text-anchor="start">Query 参数入口</text><line x1="154" y1="142" x2="178" y2="142" stroke="#2b5b90" stroke-width="2.4" marker-end="url(#arrow)"/><rect x="178" y="86" width="130" height="112" rx="18" ry="18" fill="#f6f9ff" stroke="#214b80" stroke-width="2"/><text x="194" y="114" font-size="15" fill="#214b80" font-weight="700" text-anchor="start">ChatRequest</text><text x="194" y="138" font-size="12" fill="#162033" font-weight="400" text-anchor="start">装配成统一请求对象</text><line x1="308" y1="142" x2="332" y2="142" stroke="#2b5b90" stroke-width="2.4" marker-end="url(#arrow)"/><rect x="332" y="86" width="130" height="112" rx="18" ry="18" fill="#effbf8" stroke="#0d7d89" stroke-width="2"/><text x="348" y="114" font-size="15" fill="#0d7d89" font-weight="700" text-anchor="start">ChatService</text><text x="348" y="138" font-size="12" fill="#162033" font-weight="400" text-anchor="start">先得到完整 ChatResponse</text><line x1="462" y1="142" x2="486" y2="142" stroke="#2b5b90" stroke-width="2.4" marker-end="url(#arrow)"/><rect x="486" y="86" width="130" height="112" rx="18" ry="18" fill="#effbf8" stroke="#0d7d89" stroke-width="2"/><text x="502" y="114" font-size="15" fill="#0d7d89" font-weight="700" text-anchor="start">StreamService</text><text x="502" y="138" font-size="12" fill="#162033" font-weight="400" text-anchor="start">拆成 start / message</text><text x="502" y="156" font-size="12" fill="#162033" font-weight="400" text-anchor="start">tool_result / done</text><line x1="616" y1="142" x2="640" y2="142" stroke="#2b5b90" stroke-width="2.4" marker-end="url(#arrow)"/><rect x="640" y="86" width="130" height="112" rx="18" ry="18" fill="#eefaf0" stroke="#2a8a58" stroke-width="2"/><text x="656" y="114" font-size="15" fill="#2a8a58" font-weight="700" text-anchor="start">EventCache</text><text x="656" y="138" font-size="12" fill="#162033" font-weight="400" text-anchor="start">记录 last_event</text><line x1="770" y1="142" x2="794" y2="142" stroke="#2b5b90" stroke-width="2.4" marker-end="url(#arrow)"/><rect x="794" y="86" width="130" height="112" rx="18" ry="18" fill="#fff5eb" stroke="#d46d2b" stroke-width="2"/><text x="810" y="114" font-size="15" fill="#d46d2b" font-weight="700" text-anchor="start">SSE</text><text x="810" y="138" font-size="12" fill="#162033" font-weight="400" text-anchor="start">EventSourceResponse 输出</text><rect x="24" y="266" width="820" height="160" rx="18" ry="18" fill="#eefcfb" stroke="#0d7d89" stroke-width="2"/><text x="40" y="294" font-size="15" fill="#0d7d89" font-weight="700" text-anchor="start">为什么当前流式只是“后置拆包流”</text><text x="40" y="318" font-size="12" fill="#162033" font-weight="400" text-anchor="start">1. 业务结果先由 ChatService 一次性算完。</text><text x="40" y="336" font-size="12" fill="#162033" font-weight="400" text-anchor="start">2. StreamService 再把完整结果切成 start / message / tool_result / done。</text><text x="40" y="354" font-size="12" fill="#162033" font-weight="400" text-anchor="start">3. 所以它解决的是输出协议形态，不是推理过程本身的实时流式化。</text>
</svg>